name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing version tag to package (for example v0.1.0)"
        required: true
        type: string

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Check tag matches Cargo version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          tag_version="${RELEASE_TAG#v}"
          test "${RELEASE_TAG#v}" != "${RELEASE_TAG}" || { echo "release_tag must start with v"; exit 1; }
          test "$package_version" = "$tag_version" || {
            echo "Cargo.toml version ($package_version) does not match tag ($RELEASE_TAG)"
            exit 1
          }
          cargo fmt --all --check
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo test --locked --all-targets --all-features
          cargo package --locked --allow-dirty

  build:
    name: Package ${{ matrix.platform }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          package="fleet-mcp-${RELEASE_TAG}-${{ matrix.platform }}-${arch}"
          mkdir -p "dist/$package"
          cp target/release/fleet-mcp "dist/$package/"
          cp README.md LICENSE "dist/$package/"
          tar -C dist -czf "dist/$package.tar.gz" "$package"
          (
            cd dist
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$package.tar.gz" > "$package.tar.gz.sha256"
            else
              shasum -a 256 "$package.tar.gz" > "$package.tar.gz.sha256"
            fi
          )
      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString().ToLowerInvariant()
          $package = "fleet-mcp-$env:RELEASE_TAG-windows-$arch"
          New-Item -ItemType Directory -Force -Path "dist/$package" | Out-Null
          Copy-Item target/release/fleet-mcp.exe "dist/$package/"
          Copy-Item README.md, LICENSE "dist/$package/"
          Compress-Archive -Path "dist/$package" -DestinationPath "dist/$package.zip"
          (Get-FileHash "dist/$package.zip" -Algorithm SHA256).Hash.ToLowerInvariant() + "  $package.zip" | Set-Content "dist/$package.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Create release and upload archives
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" dist/*.tar.gz dist/*.zip dist/*.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --title "Fleet MCP $RELEASE_TAG" \
            --generate-notes \
            --verify-tag
